// ── localStorage ───────────────────────────────────────────
function loadVideos(){try{var s=localStorage.getItem(LS_VIDEOS);return s?JSON.parse(s):null;}catch(e){return null;}}
function saveVideos(v){try{localStorage.setItem(LS_VIDEOS,JSON.stringify(v));}catch(e){}}
function loadLastUpdate(){try{var s=localStorage.getItem(LS_UPDATE);return s?parseInt(s):0;}catch(e){return 0;}}
function saveLastUpdate(ts){try{localStorage.setItem(LS_UPDATE,String(ts));}catch(e){}}

// ── State ──────────────────────────────────────────────────
var state={
  videos:loadVideos()||SEED,
  lastUpdate:loadLastUpdate(),
  cat:"all",menuOpen:false,selected:null,search:"",showSearch:false,
  updating:false,justUpdated:false,scrollY:0,
};

function setState(patch){
  Object.assign(state,patch);
  var goY=(patch.selected===null&&patch._restoreY!==undefined)?patch._restoreY:null;
  render();
  if(goY!==null) window.scrollTo({top:goY,behavior:"instant"});
}

// ── Video update ───────────────────────────────────────────
function addNewVideos(entries){
  var existing=state.videos;
  var maxId=existing.reduce(function(m,v){return Math.max(m,v.id);},0);
  var updated=entries.map(function(v,i){return Object.assign({},v,{id:maxId+i+1,isNew:true});})
    .concat(existing.map(function(v){return Object.assign({},v,{isNew:false});}));
  var now=Date.now();
  saveVideos(updated);saveLastUpdate(now);
  setState({videos:updated,lastUpdate:now,updating:false,justUpdated:true});
  setTimeout(function(){setState({justUpdated:false});},4000);
  // Pre-fetch ICAO analysis for all new entries
  entries.forEach(function(v,i){
    var id=maxId+i+1;
    var a=getAn(v.category);
    var dlg=a.dialogue.map(function(l){return l.from+": "+l.msg;}).join("\n");
    setTimeout(function(){
      fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,
          messages:[{role:"user",content:ICAO_PROMPT+dlg}]})
      }).then(function(r){return r.json();}).then(function(data){
        var text=(data.content||[]).map(function(b){return b.text||"";}).join("");
        icaoCache[id]=icaoToHTML(text);
      }).catch(function(){});
    }, i*2000); // stagger requests 2s apart
  });
}

function fetchNewVideos(){
  if(state.updating)return;
  setState({updating:true});
  fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,
      messages:[{role:"user",content:"Generate 10 new realistic aviation emergency YouTube video entries as a JSON array only (no markdown). Each object: category (engine/medical/weather/fire/hydraulic/fuel/bird/gear/pressurization), title (max 80 chars), channel, views (e.g. '1.2M'), duration (e.g. '18:42'). Vary airlines, aircraft, airports."}]})
  }).then(function(r){return r.json();}).then(function(data){
    var text=(data.content||[]).map(function(b){return b.text||"";}).join("");
    addNewVideos(JSON.parse(text.replace(/```json|```/g,"").trim()));
  }).catch(function(){addNewVideos(DUMMY_NEW);});
}

if((Date.now()-state.lastUpdate)>=ONE_WEEK) fetchNewVideos();

// ── Helpers ────────────────────────────────────────────────
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function getCat(id){return CATEGORIES.find(function(c){return c.id===id;})||{};}
function getAn(c){return ANALYSIS[c]||ANALYSIS["engine"];}

// ── YouTube ────────────────────────────────────────────────
window.openYoutube=function(id){
  var web="https://www.youtube.com/watch?v="+id;
  if(/iPhone|iPad|iPod/.test(navigator.userAgent)){
    window.location.href="youtube://www.youtube.com/watch?v="+id;
    setTimeout(function(){window.location.href=web;},1500);
  } else if(/Android/.test(navigator.userAgent)){
    window.location.href="intent://www.youtube.com/watch?v="+id+"#Intent;package=com.google.android.youtube;scheme=https;end";
    setTimeout(function(){window.location.href=web;},1500);
  } else {
    window.open(web,"_blank");
  }
};

var ICAO_PROMPT="You are an ICAO aviation English examiner and senior air traffic controller.\n"
  +"Your task is to improve a given pilot–ATC dialogue to ICAO Level 6 proficiency.\n"
  +"When the user provides a conversation, follow ONLY the steps below:\n\n"
  +"STEP 1: Reconstruct the conversation (Level 6)\n"
  +"* Rewrite the full dialogue to meet ICAO Level 6 standards\n"
  +"* Expand beyond basic phraseology using clear, natural, and situation-aware English\n"
  +"* Include:\n"
  +"  * detailed situation explanation\n"
  +"  * pilot decision-making and intentions\n"
  +"  * system status (if relevant)\n"
  +"  * proactive communication and interaction\n\n"
  +"STEP 2: Sentence-by-sentence correction\n"
  +"For each sentence in the original dialogue:\n"
  +"* Show the original sentence\n"
  +"* Provide a corrected Level 6 version\n"
  +"* Briefly explain why the correction improves ICAO Level 6 criteria (clarity, interaction, structure, vocabulary)\n\n"
  +"STEP 3: Advanced alternative expressions\n"
  +"* Provide 2–3 alternative expressions for key sentences\n"
  +"* Focus on paraphrasing, flexibility, and natural communication in non-routine situations\n\n"
  +"Rules:\n"
  +"* Use aviation English only\n"
  +"* Avoid unnecessary repetition\n"
  +"* Focus on clarity, situational awareness, and interaction\n"
  +"* Do NOT include evaluation, scoring, or extra steps beyond STEP 1–3\n\n"
  +"Here is the dialogue:\n";

function loadICAO(vid){
  var v=state.videos.find(function(x){return x.id===vid;});
  if(!v) return;
  var el=document.getElementById("icao-body-"+vid);
  if(!el) return;

  if(icaoCache[vid]){el.innerHTML=icaoCache[vid];return;}

  var a=getAn(v.category);
  var dlg=a.dialogue.map(function(l){return l.from+": "+l.msg;}).join("\n");

  el.innerHTML='<div style="color:'+M+';font-size:14px;padding:16px 0;text-align:center">Analyzing dialogue…</div>';

  fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,
      messages:[{role:"user",content:ICAO_PROMPT+dlg}]})
  }).then(function(r){return r.json();}).then(function(data){
    var text=(data.content||[]).map(function(b){return b.text||"";}).join("");
    var html=icaoToHTML(text);
    icaoCache[vid]=html;
    el.innerHTML=html;
  }).catch(function(){
    el.innerHTML='<div style="color:#c0392b;font-size:14px;padding:8px 0">Failed to load. <button onclick="loadICAO('+vid+')" style="background:'+N+';color:#fff;font-size:12px;font-weight:700;padding:5px 12px;border-radius:12px;border:none;cursor:pointer;margin-left:8px">Retry</button></div>';
  });
}

function icaoToHTML(text){
  // Remove unwanted title line
  text=text.replace(/ICAO Level 6 Aviation English[^\n]*\n?/gi,"");
  // Normalize PAN PAN PAN → PAN PAN
  text=text.replace(/PAN PAN PAN/gi,"PAN PAN");
  var lines=text.split("\n");
  var html='<div style="font-size:15px;line-height:1.75;color:'+T+'">';
  lines.forEach(function(raw){
    var line=raw.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    line=line.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    if(/^#{1,3}\s/.test(line)||/^STEP\s*[123]/i.test(line)){
      html+='<div style="font-size:14px;font-weight:800;color:'+N+';letter-spacing:0.8px;text-transform:uppercase;margin:22px 0 10px;padding-bottom:6px;border-bottom:1.5px solid '+N+'">'+line.replace(/^#{1,3}\s*/,"")+'</div>';
    } else if(/^[\*\-]\s/.test(line)){
      html+='<div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:7px">'
        +'<div style="width:5px;height:5px;border-radius:1px;background:'+N+';flex-shrink:0;margin-top:9px"></div>'
        +'<span>'+line.replace(/^[\*\-]\s/,"")+'</span></div>';
    } else if(/^(PILOT|ATC)\s*:/i.test(line)){
      var isPilot=/^PILOT/i.test(line);
      var msg=line.replace(/^(PILOT|ATC)\s*:\s*/i,"");
      html+='<div style="display:flex;flex-direction:'+(isPilot?"row":"row-reverse")+';align-items:flex-end;gap:8px;margin-bottom:10px">'
        +'<div style="flex-shrink:0;width:48px;height:26px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;background:'+(isPilot?N:N+"18")+';color:'+(isPilot?W:N)+';border:1px solid '+N+'28">'+(isPilot?"PILOT":"ATC")+'</div>'
        +'<div style="max-width:82%;padding:10px 14px;border-radius:8px;font-size:14px;line-height:1.6;color:'+T+';background:'+(isPilot?N+"0c":G)+';border:1px solid '+N+'18;border-bottom-'+(isPilot?"left":"right")+'-radius:2px">'+msg+'</div></div>';
    } else if(/^(Original|Corrected|Explanation|Alternative)\s*:/i.test(line)){
      html+='<div style="font-size:12px;font-weight:700;color:'+N+';letter-spacing:0.5px;margin:10px 0 4px;text-transform:uppercase">'+line+'</div>';
    } else if(line.trim()===""){
      html+='<div style="height:4px"></div>';
    } else {
      html+='<p style="margin-bottom:8px">'+line+'</p>';
    }
  });
  html+='</div>';
  return html;
}

// ── Render helpers ─────────────────────────────────────────
function secLabel(label){
  return '<div style="display:flex;align-items:center;margin-bottom:14px;padding-bottom:8px;border-bottom:1.5px solid '+N+'">'
    +'<span style="font-size:14px;font-weight:700;color:'+N+';letter-spacing:0.8px;text-transform:uppercase">'+label+'</span></div>';
}

function rolesHTML(pilotRoles,atcRoles){
  function block(label,items){
    return '<div style="border-radius:8px;padding:14px 16px;background:'+N+'0a;border:1px solid '+N+'22;margin-bottom:12px">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid '+N+'18">'
      +'<div style="width:9px;height:9px;border-radius:2px;background:'+N+'"></div>'
      +'<span style="font-size:13px;font-weight:700;color:'+N+';letter-spacing:1px">'+label+'</span></div>'
      +'<ul style="margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:10px">'
      +items.slice(0,4).map(function(item){
        return '<li style="display:flex;gap:10px;align-items:flex-start">'
          +'<div style="width:5px;height:5px;border-radius:1px;background:'+N+';flex-shrink:0;margin-top:9px"></div>'
          +'<span style="font-size:15px;line-height:1.65;color:'+T+'">'+esc(item)+'</span></li>';
      }).join("")+'</ul></div>';
  }
  return block("PILOT",pilotRoles)+block("ATC",atcRoles);
}

function dialogueHTML(dialogue){
  return dialogue.map(function(line){
    var isPilot=line.from==="PILOT";
    return '<div style="display:flex;flex-direction:'+(isPilot?"row":"row-reverse")+';align-items:flex-end;gap:8px;margin-bottom:12px">'
      +'<div style="flex-shrink:0;width:48px;height:26px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;letter-spacing:0.5px;background:'+(isPilot?N:N+"18")+';color:'+(isPilot?W:N)+';border:1px solid '+N+'28">'+line.from+'</div>'
      +'<div style="max-width:78%;padding:11px 15px;border-radius:8px;font-size:15px;line-height:1.65;color:'+T+';background:'+(isPilot?N+"0c":G)+';border:1px solid '+N+'18;border-bottom-'+(isPilot?"left":"right")+'-radius:2px">'+esc(line.msg)+'</div>'
      +'</div>';
  }).join("");
}

function cardHTML(v){
  var c=getCat(v.category);
  var playBtn=v.ytId
    ?'<a href="https://www.youtube.com/watch?v='+esc(v.ytId)+'" onclick="openYoutube(\''+esc(v.ytId)+'\');return false;" style="display:inline-flex;align-items:center;gap:4px;background:'+N+';color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;text-decoration:none;letter-spacing:0.5px;vertical-align:middle;margin-left:6px;white-space:nowrap">▶ PLAY</a>'
    :'';
  return '<div style="padding:14px 0;border-bottom:1px solid #eaeff6">'
    +'<div onclick="showDetail('+v.id+')" style="cursor:pointer">'
    +'<div style="display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:700;color:'+N+';background:'+N+'10;padding:3px 10px;border-radius:3px;margin-bottom:8px;border:1px solid '+N+'28">'+(c.icon||"")+" "+(c.label||"")+'</div>'
    +'<div style="font-size:15px;font-weight:500;line-height:1.5;color:'+T+';margin-bottom:7px">'+esc(v.title)+playBtn+'</div>'
    +'<div style="font-size:13px;color:'+M+'">'+esc(v.channel)+' · '+esc(v.views)+' views</div>'
    +'</div></div>';
}

function detailHTML(v){
  var c=getCat(v.category);
  var a=getAn(v.category);
  var playBtn=v.ytId
    ?'<a href="https://www.youtube.com/watch?v='+esc(v.ytId)+'" onclick="openYoutube(\''+esc(v.ytId)+'\');return false;" style="display:inline-flex;align-items:center;gap:8px;background:'+N+';color:#fff;font-size:16px;font-weight:800;padding:10px 28px;border-radius:28px;text-decoration:none;letter-spacing:1.5px;margin-bottom:24px">▶ PLAY</a>'
    :'';
  return '<div style="padding-bottom:48px">'
    +'<div>'
    +'<div style="display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:700;color:'+N+';background:'+N+'10;padding:4px 12px;border-radius:4px;margin-bottom:9px;border:1px solid '+N+'22">'+(c.icon||"")+" "+(c.label||"")+'</div>'
    +'<div style="font-size:19px;font-weight:700;color:'+N+';line-height:1.4;margin-bottom:6px">'+esc(v.title)+'</div>'
    +'<div style="font-size:15px;color:'+M+';margin-bottom:16px">'+esc(v.channel)+' · '+esc(v.views)+' views</div>'
    +playBtn
    +'</div>'
    +secLabel("Summary")
    +a.summary.split("\n\n").map(function(p){return '<p style="font-size:16px;line-height:1.85;color:#3a4a5a;margin-bottom:14px">'+esc(p)+'</p>';}).join("")
    +'<div style="border-top:1px solid #eaeff6;margin:24px 0"></div>'
    +secLabel("Pilot &amp; ATC Roles")
    +rolesHTML(a.pilotRoles,a.atcRoles)
    +'<div style="border-top:1px solid #eaeff6;margin:24px 0"></div>'
    +secLabel("Dialogue")
    +dialogueHTML(a.dialogue)
    +'<div style="border-top:1px solid #eaeff6;margin:24px 0"></div>'
    +secLabel("ICAO Level 6 Analysis")
    +'<div id="icao-body-'+v.id+'"><div style="color:'+M+';font-size:14px;padding:16px 0;text-align:center">Analyzing dialogue…</div></div>'
    +'<div style="border-top:1px solid #eaeff6;margin:32px 0 8px"></div>'
    +'<button onclick="setState({selected:null,_restoreY:state.scrollY||0});" style="display:flex;align-items:center;gap:6px;font-size:15px;color:'+N+';background:none;border:none;cursor:pointer;padding:0 0 16px 0;font-weight:600">← Back to List</button>'
    +'</div>';
}

// ── Main render ────────────────────────────────────────────
function render(){
  var s=state;
  var filtered=s.videos.filter(function(v){
    return(s.cat==="all"||v.category===s.cat)&&
      (s.search===""||v.title.toLowerCase().indexOf(s.search.toLowerCase())>=0);
  });
  var activeCat=getCat(s.cat);
  var lastDate=s.lastUpdate>0?new Date(s.lastUpdate).toLocaleDateString("en-US"):"";
  var html="";

  // Header
  html+='<div style="background:'+N+';padding:0 16px;position:fixed;top:0;left:0;right:0;max-width:480px;margin:0 auto;z-index:30">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;height:52px">'
    +'<button onclick="setState({showSearch:!state.showSearch})" style="background:none;border:none;cursor:pointer;color:#fff;font-size:17px;padding:6px;line-height:1;opacity:0.8">🔍</button>'
    +'<div onclick="setState({cat:\'all\',selected:null,search:\'\',showSearch:false});window.scrollTo({top:0,behavior:\'instant\'});" style="display:flex;flex-direction:column;align-items:center;cursor:pointer">'
    +'<span style="font-size:18px;font-weight:800;color:#fff;letter-spacing:0.5px">ATC Emergency</span>'
    +'<span style="font-size:9px;color:rgba(255,255,255,0.45);letter-spacing:0.3px">© bongsjeon@koreanair.com</span>'
    +'</div>'
    +'<button onclick="setState({menuOpen:!state.menuOpen})" style="background:none;border:none;cursor:pointer;padding:6px 2px;display:flex;flex-direction:column;gap:4px">'
    +'<div style="width:20px;height:2px;background:#fff;border-radius:1px"></div>'
    +'<div style="width:20px;height:2px;background:#fff;border-radius:1px"></div>'
    +'<div style="width:20px;height:2px;background:#fff;border-radius:1px"></div>'
    +'</button></div></div>';

  // Dropdown
  if(s.menuOpen){
    html+='<div onclick="setState({menuOpen:false})" style="position:fixed;inset:0;z-index:24"></div>'
      +'<div style="position:fixed;top:52px;right:0;width:200px;background:#fff;z-index:25;box-shadow:-4px 4px 20px rgba(0,30,80,0.15);border-top:3px solid '+N+';border-left:1px solid #e0e8f0;border-radius:0 0 0 10px;overflow:hidden">'
      +CATEGORIES.map(function(c,i){
        var active=s.cat===c.id;
        return '<button onclick="setState({cat:\''+c.id+'\',menuOpen:false,selected:null})" '
          +'style="display:flex;align-items:center;gap:10px;width:100%;padding:11px 16px;background:'+(active?N:"#fff")+';color:'+(active?"#fff":T)+';border:none;border-bottom:'+(i<CATEGORIES.length-1?"1px solid #eaeff6":"none")+';cursor:pointer;text-align:left;font-size:13px;font-weight:'+(active?700:400)+'">'
          +'<span style="font-size:14px;width:18px;text-align:center;flex-shrink:0">'+c.icon+'</span>'
          +'<span>'+c.label+'</span>'
          +(active?'<div style="margin-left:auto;width:5px;height:5px;border-radius:50%;background:#fff;flex-shrink:0"></div>':'')
          +'</button>';
      }).join("")+'</div>';
  }

  // Search
  if(s.showSearch){
    html+='<div style="background:'+G+';padding:10px 16px;border-bottom:1px solid #e0e8f0;position:fixed;top:52px;left:0;right:0;max-width:480px;margin:0 auto;z-index:24">'
      +'<div style="background:#fff;border-radius:8px;padding:9px 14px;display:flex;align-items:center;gap:8px;border:1.5px solid '+N+'44">'
      +'<span style="font-size:15px;color:'+M+'">🔍</span>'
      +'<input id="searchInput" value="'+esc(s.search)+'" oninput="setState({search:this.value})" placeholder="Search..." style="flex:1;background:none;border:none;outline:none;color:'+T+';font-size:15px" autofocus/>'
      +(s.search?'<button onclick="setState({search:\'\'})" style="background:none;border:none;color:'+M+';cursor:pointer;font-size:16px;padding:0">✕</button>':'')
      +'</div></div>';
  }

  // Category bar
  html+='<div style="background:'+N+';padding:8px 16px 10px;position:sticky;top:52px;z-index:20;margin-top:52px">'
    +'<div style="display:flex;align-items:center;justify-content:space-between">'
    +'<div>'
    +'<div style="font-size:10px;color:rgba(255,255,255,0.45);letter-spacing:1px;margin-bottom:2px">CATEGORY</div>'
    +'<div style="font-size:15px;font-weight:700;color:#fff;display:flex;align-items:center;gap:7px"><span>'+(activeCat.icon||"")+'</span><span>'+(activeCat.label||"")+'</span></div>'
    +'</div>'
    +'<button onclick="setState({cat:\'all\',selected:null,search:\'\',showSearch:false});window.scrollTo({top:0,behavior:\'instant\'});" style="background:#fff;border:none;color:'+N+';font-size:12px;font-weight:700;padding:6px 14px;border-radius:8px;cursor:pointer">🏠 Home</button>'
    +'</div></div>';

  // Content
  html+='<div style="padding:0 16px">';
  if(s.selected){
    html+=detailHTML(s.selected);
  } else {
    html+='<div style="font-size:13px;color:'+M+';padding:10px 0 2px;display:flex;justify-content:space-between">'
      +'<span>'+filtered.length+' recordings</span>'
      +(lastDate?'<span>Updated: '+lastDate+'</span>':'')
      +'</div>'
      +filtered.map(cardHTML).join("")
      +(filtered.length===0?'<div style="text-align:center;padding:60px 0;color:'+M+';font-size:15px">No results found</div>':'');
  }
  html+='</div>';

  document.getElementById("app").innerHTML=html;
  if(s.showSearch){var inp=document.getElementById("searchInput");if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);}}
}

// ── Global handlers ────────────────────────────────────────
window.setState=function(patch){
  Object.assign(state,patch);
  var goY=(patch.selected===null&&patch._restoreY!==undefined)?patch._restoreY:null;
  render();
  if(goY!==null) window.scrollTo({top:goY,behavior:"instant"});
};

window.showDetail=function(id){
  var v=state.videos.find(function(v){return v.id===id;});
  if(v){
    setState({selected:v,scrollY:window.scrollY});
    window.scrollTo({top:0,behavior:"instant"});
    setTimeout(function(){loadICAO(id);},100);
  }
};

window.fetchNewVideos=fetchNewVideos;

render();

// ── Swipe right → back to list ─────────────────────────────
(function(){
  var sx=0,sy=0;
  document.addEventListener("touchstart",function(e){sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
  document.addEventListener("touchend",function(e){
    if(!state.selected)return;
    var dx=e.changedTouches[0].clientX-sx;
    var dy=e.changedTouches[0].clientY-sy;
    if(dx<60||Math.abs(dy)>Math.abs(dx)*0.6)return;
    setState({selected:null,_restoreY:state.scrollY||0});
  },{passive:true});
})();
</script>
